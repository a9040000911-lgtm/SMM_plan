upstream nextjs {
    server app:3000;
    keepalive 64;
}

# Proxy Cache Settings
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=STATIC:10m inactive=24h max_size=1g;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Performance Tuning
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # Crucial for CSS/JS to be recognized by the browser
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets in /public (Next.js)
    # Using root is safer than alias for general file matching
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|otf|eot|mp4|webm|webmanifest)$ {
        root /app/public;
        # Since 'root' appends the full URI, we need to handle files that are NOT in public
        # but match these extensions (like fonts in _next/static/media).
        # We will let ^~ /_next/static/ handle those.
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # Static files (Next.js internal build assets)
    location ^~ /_next/static/ {
        alias /app/.next/static/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        
        # Micro-caching for static assets
        proxy_cache STATIC;
        proxy_cache_valid 200 302 60m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    }

    # API rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default — all other routes
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Force cookies to be non-secure for HTTP testing
        proxy_cookie_flags admin_session nosecure;
        proxy_cookie_flags next-auth.session-token nosecure;

        # Timeouts
        proxy_connect_timeout 10800s;
        proxy_send_timeout 10800s;
        proxy_read_timeout 10800s;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }
}
