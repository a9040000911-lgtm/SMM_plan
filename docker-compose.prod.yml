# Set BUILDKIT_PROGRESS=plain in your shell before running 'docker compose build' 
# for more readable logs. Example: $env:BUILDKIT_PROGRESS="plain"; docker compose up -d --build

services:
  # === Nginx reverse proxy ===
  nginx:
    image: public.ecr.aws/docker/library/nginx:alpine
    container_name: smmplan-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - next_static:/usr/share/nginx/html/_next/static:ro
      - next_public:/usr/share/nginx/html/public:ro
    depends_on:
      - app
    restart: always

  # === Certbot для SSL ===
  certbot:
    image: certbot/certbot
    container_name: smmplan-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    # Добавим системную настройку лимитов файлов внутри контейнера
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # === Next.js App ===
  app:
    image: smmplan-app:latest
    build:
      context: .
      target: runner
    expose:
      - "3000"
    volumes:
      - next_static:/app/.next/static
      - next_public:/app/public
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://smmuser:smmpassword@db:5432/smmplan?schema=public
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - NEXT_PHASE=phase-production-server
      - SKIP_BOT=true
      - HOSTNAME=0.0.0.0
      - PRISMA_CLIENT_ENGINE_TYPE=library
      - AUTH_TRUST_HOST=true
      - NEXT_PUBLIC_URL=https://smmplan.pro
      - NEXT_PUBLIC_APP_URL=https://smmplan.pro
      - NEXTAUTH_URL=https://smmplan.pro
      - NEXTAUTH_URL_INTERNAL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode === 200 || r.statusCode === 404) process.exit(0); else process.exit(1);})" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    deploy:
      mode: replicated
      replicas: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # === PostgreSQL (tuned for 256MB) ===
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: smmplan-db
    environment:
      - POSTGRES_USER=smmuser
      - POSTGRES_PASSWORD=smmpassword
      - POSTGRES_DB=smmplan
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./postgres/tune.sql:/docker-entrypoint-initdb.d/tune.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U smmuser -d smmplan" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # === Redis (LRU 128MB) ===
  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: smmplan-redis
    # ports закрыты снаружи (безопасность)
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction --save ""
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # === Telegram Bot (slim) ===
  bot:
    image: smmplan-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: bot-runner
    container_name: smmplan-bot
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://smmuser:smmpassword@db:5432/smmplan?schema=public
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SKIP_BOT=false
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - PRISMA_CLIENT_ENGINE_TYPE=library
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npx tsx src/bot/index.ts
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

volumes:
  postgres_data_prod:
  next_static:
  next_public:
