stages:
  - test
  - deploy

variables:
  BUILDKIT_PROGRESS: plain

# Проверка качества кода и типизации
lint-and-typecheck:
  stage: test
  image: node:18-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run lint
    - npx tsc --noEmit
  only:
    - merge_requests
    - main
  interruptible: true

# Автоматический деплой на сервер
deploy-production:
  stage: deploy
  tags:
    - smmplan-shell
  only:
    - main
  script:
    - echo "🚀 [$(date)] Starting automated deployment to production..."
    - chmod +x scripts/migrate-server.sh
    - ./scripts/migrate-server.sh
  environment:
    name: production
    url: https://smmplan.ru
  when: on_success
