services:
  server:
    image: gitea/gitea:1.21.6
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__DB_NAME=gitea
      - GITEA__database__LOG_SQL=false
      - GITEA__server__DOMAIN=89.23.98.202
      - GITEA__server__SSH_DOMAIN=89.23.98.202
      - GITEA__server__ROOT_URL=http://89.23.98.202:8080/
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__SSH_LISTEN_PORT=2222
    restart: always
    networks:
      - gitea
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8080:3000"
      - "2222:2222"

networks:
  gitea:
    external: false
